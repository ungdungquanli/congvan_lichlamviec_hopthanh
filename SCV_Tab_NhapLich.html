<style>
  .btn-icon { border: 1px solid #ccc; background: #f1f5f9; cursor: pointer; padding: 4px 8px; border-radius: 4px; font-size: 14px; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; height: 28px; }
  .btn-upload-icon:hover { background: #e2e8f0; border-color: #94a3b8; }
  .btn-view-icon { background: #dbeafe; color: #1e40af; border-color: #bfdbfe; padding: 4px 6px; }
  .btn-view-icon:hover { background: #bfdbfe; }
  .btn-ai-icon { background: #fef08a; border-color: #fde047; color: #854d0e; }
  .btn-ai-icon:hover { background: #fde047; border-color: #eab308; }
</style>

<div style="margin-bottom: 10px; overflow: hidden; display: flex; justify-content: space-between; align-items: center;">
  <div style="font-family:'Times New Roman'; font-weight:bold; color:#1e3a8a; font-size:16px;">
    📝 NHẬP LỊCH CÔNG TÁC
  </div>
</div>

<div class="table-scroll">
  <table id="tblLich">
    <thead>
      <tr>
        <th style="width:40px">Xóa</th>
        <th style="width:110px">Thời gian<br>(dd/mm/yyyy)</th> <th style="width:70px">Giờ</th> <th>Nội dung công việc <span style="color:red">*</span></th> <th style="width:130px">Chủ trì</th> <th style="width:200px">Địa điểm</th> <th style="width:150px">Thành phần</th> <th style="width:130px">File & AI</th> </tr>
    </thead>
    <tbody id="bodyLich">
       <tr class="input-row">
         <td><button onclick="delRowLich(this)" style="color:red;border:none;background:none;cursor:pointer; font-size: 16px;">🗑️</button></td>
         <td style="text-align: center; vertical-align: middle;"><textarea class="cell-input text-center" rows="1" oninput="formatDate(this); autoResize(this)" placeholder="dd/mm/yyyy" style="resize:none; overflow:hidden;"></textarea></td>
         <td style="text-align: center; vertical-align: middle;"><textarea class="cell-input text-center" rows="1" placeholder="HH:mm" oninput="autoResize(this)" style="resize:none; overflow:hidden;"></textarea></td>
         <td style="text-align: left !important; vertical-align: middle !important; padding: 1px;"><textarea class="cell-input" style="text-align: left; padding-left: 8px; min-height:40px; overflow:hidden; resize:none; line-height:1.5;" rows="1" oninput="autoResize(this)" placeholder="Nhập nội dung..."></textarea></td>
         <td style="text-align: center; vertical-align: middle;"><textarea class="cell-input text-center" rows="1" oninput="autoResize(this)" style="resize:none; overflow:hidden;"></textarea></td>
         <td style="text-align: center; vertical-align: middle;"><textarea class="cell-input text-center" rows="1" oninput="autoResize(this)" style="resize:none; overflow:hidden;"></textarea></td>
         <td style="text-align: center; vertical-align: middle;"><textarea class="cell-input text-center" rows="1" oninput="autoResize(this)" style="resize:none; overflow:hidden;"></textarea></td>
         
         <td style="vertical-align: middle; padding: 2px;">
            <div style="display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 3px; width: 100%;">
                <div class="link-display-area" style="width: 100%; display:flex; flex-wrap:wrap; gap:3px; justify-content:center;"></div>
                <button type="button" onclick="openUploadLich(this)" class="btn-icon btn-upload-icon" title="Đính kèm file" style="opacity:1; pointer-events:auto;">📎 Đính kèm</button>
                <button type="button" onclick="extractAILichInfo(this)" class="btn-icon btn-ai-icon" title="Sử dụng AI đọc nội dung và điền lịch">✨ AI</button>
                <input type="hidden" class="val-link url-holder">
                <input type="hidden" class="val-id">
            </div>
         </td>
       </tr>
    </tbody>
  </table>
</div>

<div style="margin-top:15px; display: flex; justify-content: space-between; align-items: center;">
    <button id="btnAddRow" onclick="addRowLich()" style="background:#64748b; color:white; padding:8px 15px; border:none; border-radius:4px; cursor:pointer;">+ Thêm dòng</button>
    <button class="btn-save" style="background:#1e3a8a; color:white; padding:8px 25px; border:none; border-radius:4px; cursor:pointer; font-weight:bold;" onclick="handleSaveLich()">💾 LƯU LỊCH CÔNG TÁC</button>
</div>

<script>
  function addRowLich() {
    const tbody = document.getElementById('bodyLich');
    const newRow = tbody.rows[0].cloneNode(true);
    newRow.querySelectorAll('textarea').forEach(t => { t.value = ""; t.style.height = 'auto'; });
    const container = newRow.cells[7].querySelector('div');
    container.querySelector('.btn-upload-icon').innerHTML = '📎 Đính kèm';
    container.querySelector('.btn-upload-icon').style.borderColor = "#ccc";
    container.querySelector('.link-display-area').innerHTML = '';
    container.querySelector('.val-link').value = "";
    container.querySelector('.val-id').value = ""; 
    tbody.appendChild(newRow);
  }

  function delRowLich(btn) { if(document.querySelectorAll('#bodyLich tr').length > 1) btn.closest('tr').remove(); else toast('Không thể xóa dòng cuối cùng!'); }
 
  function autoResize(elm) { elm.style.height = 'auto'; elm.style.height = elm.scrollHeight + 'px'; }
  
  function formatDate(elm) { 
    // Tab Lịch sử dụng định dạng 1 dòng, nên vẫn lọc số để chuẩn hóa dd/mm/yyyy
    if(elm.value.includes(';') || elm.value.includes('\n')) return; 
    let v = elm.value.replace(/\D/g,''); 
    if (v.length > 8) v = v.substring(0,8); 
    let o = ""; 
    if (v.length > 0) o += v.substring(0,2); 
    if (v.length > 2) o += '/' + v.substring(2,4);
    if (v.length > 4) o += '/' + v.substring(4,8); 
    elm.value = o; 
  }

  const ID_FOLDER_LICH = '1hXXJWftw5Z9bFvS686ezV41nHIb_4-n8';
  
  function openUploadLich(btn) {
       const container = btn.parentElement;
       const linkCu = container.querySelector('.val-link').value || "";
       if(typeof SCV_OpenUploadModal === 'function') { 
           SCV_OpenUploadModal(btn, linkCu, ID_FOLDER_LICH);
       } else { alert("Lỗi: Module upload chưa tải!"); }
  }

  // ==========================================================
  // KHỐI XỬ LÝ TRỢ LÝ AI: TỔNG HỢP 1 SỰ KIỆN DUY NHẤT (TAB LỊCH)
  // ==========================================================
  function extractAILichInfo(btn) {
      const tr = btn.closest('tr');
      const container = btn.parentElement;
      const linkStr = container.querySelector('.val-link').value;
      
      if (!linkStr || linkStr.trim() === "") {
          toast("⚠️ Vui lòng đính kèm tài liệu (PDF/Word đã chuyển PDF/Ảnh) trước khi sử dụng AI!");
          return;
      }
      
      const originalHtml = btn.innerHTML;
      btn.innerHTML = "⏳ Đang xử lý...";
      btn.disabled = true;

      // PROMPT MỚI: Yêu cầu AI chắt lọc và tổng hợp thành 1 lịch duy nhất, 1 dòng liền mạch
      const query = `Đọc nội dung TẤT CẢ các văn bản được cung cấp và tổng hợp thành MỘT sự kiện lịch công tác DUY NHẤT.
YÊU CẦU BẮT BUỘC: 
1. TRẢ VỀ DUY NHẤT 1 ĐỐI TƯỢNG JSON PHẲNG. Không trả về Mảng (Array).
2. TỔNG HỢP DỮ LIỆU: Dù có nhiều tài liệu đính kèm, hãy chắt lọc và tổng hợp thành 1 lịch trình hợp nhất (chỉ 1 dòng, KHÔNG phân tách xuống dòng).
3. Các khóa (keys) bắt buộc phải y hệt như sau:
{
  "ngay": "Ngày tổ chức sự kiện (BẮT BUỘC định dạng chuẩn dd/MM/yyyy).",
  "gio": "Giờ tổ chức sự kiện (VD: 08:00 hoặc 14:00).",
  "noidung": "Nội dung công việc (Thường là phần trích yếu ở đầu văn bản. Viết thành 1 câu hoặc 1 đoạn liền mạch, không gạch đầu dòng).",
  "chutri": "Người hoặc cơ quan chủ trì.",
  "diadiem": "Địa điểm tổ chức.",
  "thanhphan": "Thành phần được mời hoặc tham gia."
}`;

      google.script.run.withSuccessHandler(function(res) {
          btn.innerHTML = originalHtml;
          btn.disabled = false;
          
          if (res && res.success) {
              try {
                  let rawData = JSON.parse(res.message);
                  let aiData = {};

                  // Kỹ thuật ép phẳng: Nếu AI lỡ sinh ra mảng, ta gom lại trên cùng 1 dòng cách nhau bằng dấu phẩy/chấm phẩy (KHÔNG XUỐNG DÒNG)
                  if (Array.isArray(rawData)) {
                      rawData.forEach(item => {
                          for (let k in item) {
                              if (item[k]) aiData[k] = aiData[k] ? (aiData[k] + "; " + item[k]) : item[k];
                          }
                      });
                  } else if (typeof rawData === 'object' && rawData !== null) {
                      if (!rawData.ngay && !rawData.noidung && Object.keys(rawData).length > 0) {
                          for (let fKey in rawData) {
                              if (typeof rawData[fKey] === 'object') {
                                  for (let k in rawData[fKey]) {
                                      if (rawData[fKey][k]) aiData[k] = aiData[k] ? (aiData[k] + "; " + rawData[fKey][k]) : rawData[fKey][k];
                                  }
                              }
                          }
                      } else {
                          aiData = rawData; 
                      }
                  }

                  const inputs = tr.querySelectorAll('textarea');
                  
                  // Đẩy dữ liệu vào ô, đã sửa biến aiData.noidung theo chuẩn của Lịch
                  if (aiData.ngay) inputs[0].value = aiData.ngay;
                  if (aiData.gio) inputs[1].value = aiData.gio;
                  if (aiData.noidung) inputs[2].value = aiData.noidung; 
                  if (aiData.chutri) inputs[3].value = aiData.chutri;
                  if (aiData.diadiem) inputs[4].value = aiData.diadiem;
                  if (aiData.thanhphan) inputs[5].value = aiData.thanhphan;
                  
                  inputs.forEach(t => autoResize(t));
                  toast("✨ AI đã tổng hợp sự kiện Lịch công tác thành công!");
              } catch (e) {
                  toast("⚠️ Lỗi trích xuất cấu trúc dữ liệu. Vui lòng thử lại!");
              }
          } else {
              toast("❌ Lỗi AI: " + (res ? res.message : "Lỗi không xác định"));
          }
      }).withFailureHandler(function(err) {
          btn.innerHTML = originalHtml;
          btn.disabled = false;
          toast("❌ Lỗi kết nối Google Script: " + err.message);
      }).SCV_extractLichFromDocument(linkStr, query, "");
  }

  function handleSaveLich() {
    const rows = document.querySelectorAll('.input-row');
    const data = [];
    rows.forEach(tr => {
      const inputs = tr.querySelectorAll('textarea');
      const chutri = tr.cells[4].querySelector('textarea').value;    
      const diadiem = tr.cells[5].querySelector('textarea').value;   
      const thanhphan = tr.cells[6].querySelector('textarea').value; 
      const url = tr.querySelector('.val-link').value;
      const id = tr.querySelector('.val-id').value; 
      
      if (inputs[2].value.trim() !== "") {
        data.push([ inputs[0].value, inputs[1].value, inputs[2].value, chutri, diadiem, thanhphan, url, id ]);
      }
    });
    
    if (data.length === 0) return toast("⚠️ Nhập ít nhất một nội dung công việc để lưu!");
    
    const btn = document.querySelector('.btn-save');
    btn.disabled = true;
    btn.innerText = "⏳ ĐANG LƯU...";
    
    google.script.run.withSuccessHandler(res => {
      btn.disabled = false; btn.innerText = "💾 LƯU LỊCH CÔNG TÁC";
      
      if(res.includes("Đã lưu") || res.includes("✅") || res.includes("Thành công") || res.includes("cập nhật")) {
         toast(res);
         const tbody = document.getElementById('bodyLich');
         while(tbody.rows.length > 1) tbody.deleteRow(1);
         const r = tbody.rows[0];
         r.querySelectorAll('textarea').forEach(t => { t.value = ""; t.style.height = 'auto'; });
         
         const container = r.cells[7].querySelector('div');
         container.querySelector('.btn-upload-icon').innerHTML = '📎 Đính kèm';
         container.querySelector('.btn-upload-icon').style.borderColor = "#ccc";
         container.querySelector('.link-display-area').innerHTML = '';
         container.querySelector('.val-link').value = "";
         container.querySelector('.val-id').value = "";
      } else {
         toast(res);
      }
    }).withFailureHandler(err => {
         btn.disabled = false; 
         btn.innerText = "💾 LƯU LỊCH CÔNG TÁC";
         toast("❌ Lỗi hệ thống: " + err);
    }).SCV_saveDataLich(data);
  }

function fillFormLich(rowData) {
    const tbody = document.getElementById('bodyLich');
    while(tbody.rows.length > 1) tbody.deleteRow(1);
    const r = tbody.rows[0];
    const inputs = r.querySelectorAll('textarea');
    
    inputs[0].value = rowData[0] || ""; 
    inputs[1].value = rowData[1] || ""; 
    inputs[2].value = rowData[2] || "";
    inputs[3].value = rowData[3] || ""; 
    inputs[4].value = rowData[4] || ""; 
    inputs[5].value = rowData[5] || ""; 
    
    let rawLink = rowData[6];
    let finalUrl = "";
    if (rawLink && typeof rawLink === 'object') { finalUrl = rawLink.url || ""; } 
    else { finalUrl = rawLink || ""; }

    const id = rowData[7] || ""; 
    const container = r.cells[7].querySelector('div');
    container.querySelector('.val-link').value = finalUrl;
    let inputId = container.querySelector('.val-id');
    if(!inputId) {
        inputId = document.createElement('input');
        inputId.type = 'hidden';
        inputId.className = 'val-id';
        container.appendChild(inputId);
    }
    inputId.value = id;

    const displayArea = container.querySelector('.link-display-area');
    const btnUpload = container.querySelector('.btn-upload-icon');
    if(finalUrl && finalUrl.trim() !== "") {
        const links = finalUrl.split(',').map(l => l.trim()).filter(l => l !== "");
        displayArea.innerHTML = links.map((l, idx) => 
            `<a href="${l}" target="_blank" class="btn-icon btn-view-icon" title="Xem tài liệu ${idx + 1}">📎 ${idx + 1}</a>`
        ).join('');
        btnUpload.innerHTML = '📝 Sửa/Thêm'; 
        btnUpload.title = "Cập nhật hoặc thêm file";
        btnUpload.style.borderColor = "#f59e0b";
    } else {
        displayArea.innerHTML = '';
        btnUpload.innerHTML = '📎 Đính kèm';
        btnUpload.title = "Đính kèm file";
        btnUpload.style.borderColor = "#ccc";
    }
    
    inputs.forEach(t => autoResize(t));
    document.getElementById('tblLich').scrollIntoView({behavior: "smooth", block: "center"});
}
</script>
